<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa</title>
    <style>
        body {
            background-color: lightslategray;
            color: white;
            font: normal 20pt Arial;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo! </h1>
    <p>Já me livrei da maldiçao. </p>

    <script>
        var n1 = Number.parseInt (window.prompt ('Digite um numero: ')) // acrescentar Number.parseInt para converter a string em um numero
        var n2 =  Number.parseInt (window.prompt ('Digite outro numero: '))
        var s = n1 + n2
        window.alert (`A soma entre ${n1} e ${n2} é igual a ${s}`) //template string utilizada

        /* Dependendo do caso pode usar somente Number que tambem faz a conversao de string para numero: 
        
        var n1 = Number(window.prompt ('Digite um numero: ')) // acrescentar Number.parseInt para converter a string em um numero
        var n2 =  Number(window.prompt ('Digite outro numero: '))
        
        */
    </script>
</body>
</html>
